name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: darwin-aarch64
            lib: liblibsql.dylib
          - os: ubuntu-latest
            platform: linux-amd64
            lib: liblibsql.so
          - os: windows-latest
            platform: windows-amd64
            lib: libsql.dll

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-java@v4
        with:
          distribution: oracle
          java-version: 25

      - uses: dtolnay/rust-toolchain@stable

      - name: Build native library
        working-directory: libsql-c
        run: cargo build --release --features encryption

      - name: Copy native lib
        shell: bash
        run: |
          mkdir -p native/${{ matrix.platform }}
          cp libsql-c/target/release/${{ matrix.lib }} native/${{ matrix.platform }}/

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build & test
        run: ./gradlew build -x initSubmodules -x buildLibsqlNative

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.platform }}
          path: native/${{ matrix.platform }}/${{ matrix.lib }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    name: Publish

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-java@v4
        with:
          distribution: oracle
          java-version: 25

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          path: native-artifacts

      - name: Arrange native libs
        shell: bash
        run: |
          mkdir -p native/darwin-aarch64 native/linux-amd64 native/windows-amd64
          cp native-artifacts/native-darwin-aarch64/* native/darwin-aarch64/
          cp native-artifacts/native-linux-amd64/* native/linux-amd64/
          cp native-artifacts/native-windows-amd64/* native/windows-amd64/

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish to GitHub Packages
        run: ./gradlew publish -x initSubmodules -x buildLibsqlNative -x test
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/libs/*.jar
            native/darwin-aarch64/*
            native/linux-amd64/*
            native/windows-amd64/*
          generate_release_notes: true
