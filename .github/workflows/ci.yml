name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: darwin-aarch64
            lib: liblibsql.dylib
          - os: ubuntu-latest
            platform: linux-amd64
            lib: liblibsql.so
          - os: windows-latest
            platform: windows-amd64
            lib: libsql.dll

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-java@v4
        with:
          distribution: oracle
          java-version: 25

      - uses: dtolnay/rust-toolchain@stable

      - name: Build native library
        working-directory: libsql-c
        run: cargo build --release --features encryption

      - name: Copy native lib
        shell: bash
        run: |
          mkdir -p native/${{ matrix.platform }}
          cp libsql-c/target/release/${{ matrix.lib }} native/${{ matrix.platform }}/

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build & test
        run: ./gradlew build -x initSubmodules -x buildLibsqlNative

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.platform }}
          path: native/${{ matrix.platform }}/${{ matrix.lib }}

  assemble:
    needs: build
    runs-on: ubuntu-latest
    name: Assemble JARs

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-java@v4
        with:
          distribution: oracle
          java-version: 25

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          path: native-artifacts

      - name: Arrange native libs
        shell: bash
        run: |
          mkdir -p native/darwin-aarch64 native/linux-amd64 native/windows-amd64
          cp native-artifacts/native-darwin-aarch64/* native/darwin-aarch64/
          cp native-artifacts/native-linux-amd64/* native/linux-amd64/
          cp native-artifacts/native-windows-amd64/* native/windows-amd64/

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build JARs
        run: ./gradlew jar sourcesJar javadocJar -x initSubmodules -x buildLibsqlNative -x test

      - name: Upload JARs
        uses: actions/upload-artifact@v4
        with:
          name: jars
          path: build/libs/*.jar
